<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stickGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="ballGrad" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#020617" rx="20"/>
  
  <!-- Joystick Base -->
  <ellipse cx="50" cy="75" rx="35" ry="15" fill="url(#baseGrad)" filter="url(#glow)"/>
  
  <!-- Joystick Stick -->
  <rect x="45" y="40" width="10" height="35" fill="url(#stickGrad)" rx="5"/>
  
  <!-- Joystick Ball -->
  <circle cx="50" cy="35" r="18" fill="url(#ballGrad)" filter="url(#glow)"/>
  
  <!-- Highlight on ball -->
  <ellipse cx="45" cy="30" rx="8" ry="6" fill="rgba(255,255,255,0.6)"/>
</svg>
