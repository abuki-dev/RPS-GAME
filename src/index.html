<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./output.css" />
    <title>BK Tech | RPS Game</title>
  </head>
  <body
    class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6"
  >
    <div class="max-w-2xl w-full space-y-8">
      <div class="text-center space-y-2">
        <h1 class="text-4xl font-black text-white tracking-tight">
          BK <span class="text-blue-500">GAME</span>
        </h1>
        <p class="text-slate-500 text-sm uppercase tracking-widest">
          Rock Paper Scissor Logic Lab
        </p>
      </div>

      <div
        class="bg-slate-900/50 border border-slate-800 p-8 rounded-3xl shadow-2xl backdrop-blur-sm"
      >
        <form class="flex flex-col md:flex-row items-end gap-6">
          <label class="flex-1 w-full space-y-2">
            <span class="text-xs font-bold text-slate-500 uppercase ml-1"
              >Current Selection</span
            >
            <input
              type="text"
              disabled
              id="player-choice"
              placeholder="Select an weapon..."
              class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-blue-400 font-bold focus:outline-none placeholder:text-slate-700"
            />
          </label>

          <label class="space-y-2 w-full md:w-32">
            <span class="text-xs font-bold text-slate-500 uppercase ml-1"
              >Total Rounds</span
            >
            <input
              type="number"
              required
              id="totalrounds"
              value="5"
              class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500/50 outline-none"
            />
          </label>

          <button
            type="button"
            class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-500/20 active:scale-95"
          >
            Start Game
          </button>
        </form>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <button
          data-choice="Rock"
          class="group flex flex-col items-center gap-3 bg-slate-900 border border-slate-800 hover:border-blue-500 p-6 rounded-2xl transition-all duration-300 hover:bg-blue-500/5 active:scale-95"
        >
          <span class="text-3xl group-hover:scale-110 transition-transform"
            >🪨</span
          >
          <span class="text-sm font-bold uppercase tracking-wider">Rock</span>
        </button>
        <button
          data-choice="Papper"
          class="group flex flex-col items-center gap-3 bg-slate-900 border border-slate-800 hover:border-blue-500 p-6 rounded-2xl transition-all duration-300 hover:bg-blue-500/5 active:scale-95"
        >
          <span class="text-3xl group-hover:scale-110 transition-transform"
            >📄</span
          >
          <span class="text-sm font-bold uppercase tracking-wider">Papper</span>
        </button>
        <button
          data-choice="Scissor"
          class="group flex flex-col items-center gap-3 bg-slate-900 border border-slate-800 hover:border-blue-500 p-6 rounded-2xl transition-all duration-300 hover:bg-blue-500/5 active:scale-95"
        >
          <span class="text-3xl group-hover:scale-110 transition-transform"
            >✂️</span
          >
          <span class="text-sm font-bold uppercase tracking-wider"
            >Scissor</span
          >
        </button>
      </div>

      <div
        class="grid grid-cols-2 gap-px bg-slate-800 border border-slate-800 rounded-2xl overflow-hidden shadow-xl"
      >
        <div class="bg-slate-900 p-6 text-center">
          <p class="text-xs font-bold text-slate-500 uppercase mb-1">
            Your Score
          </p>
          <p class="text-4xl font-black text-white" id="your-score">0</p>
        </div>
        <div class="bg-slate-900 p-6 text-center border-l border-slate-800">
          <p class="text-xs font-bold text-slate-500 uppercase mb-1">
            CPU Score
          </p>
          <p class="text-4xl font-black text-white" id="computer-score">0</p>
        </div>
      </div>

      <div
        class="bg-slate-900/80 border border-blue-500/20 p-6 rounded-2xl text-center space-y-2"
      >
        <p
          class="text-slate-400 font-mono text-sm uppercase tracking-[0.25em] bg-gradient-to-r from-slate-900/50 to-slate-800/50 backdrop-blur-sm px-4 py-2.5 rounded-xl border border-slate-700/50 shadow-lg shadow-slate-900/20 font-semibold select-none"
        >
          Round Progress:
          <span
            id="currunt-round"
            class="text-blue-400/90 font-bold text-base bg-gradient-to-r from-blue-500/20 to-blue-600/20 px-3 py-1 rounded-lg border border-blue-500/30 shadow-md shadow-blue-500/10 ml-2"
          >
            0
          </span>
        </p>
        <p id="result" class="text-lg font-bold text-white italic"></p>
      </div>
    </div>
    <div
      id="game-modal"
      class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center hidden z-50"
    >
      <div
        class="bg-slate-900 border border-slate-700 p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl scale-95 transition-all"
      >
        <div id="modal-icon" class="text-5xl mb-4">📢</div>
        <h2 id="modal-title" class="text-2xl font-black text-white mb-2">
          Round Result
        </h2>
        <p id="modal-message" class="text-slate-400 mb-6"></p>
        <button
          id="close-modal"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all"
        >
          Continue
        </button>
      </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
